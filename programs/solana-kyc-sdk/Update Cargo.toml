```toml
[package]
name = "solana-kyc-sdk"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "solana_kyc_sdk"

[features]
no-entrypoint = []
no-idl = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = "1.0.0"
anchor-spl = "1.0.0"
solana-program = "2.0.0"
spl-token-2022 = { version = "4.0.0", features = ["no-entrypoint"] }
spl-transfer-hook-interface = "0.8.0"
bytemuck = { version = "1.14.0", features = ["derive", "min_const_generics"] }
spl-pod = "0.2.0"

[lib]
crate-type = ["cdylib", "lib"]
